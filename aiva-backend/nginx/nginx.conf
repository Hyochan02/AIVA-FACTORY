# =========================================================
# AIVA FACTORY · Nginx 설정
# 역할 1: /api → backend:3000 리버스 프록시
# 역할 2: / → React 빌드 정적 파일 서빙 (SPA)
# =========================================================

server {
    listen 80;
    server_name _;

    # 클라이언트 최대 업로드 크기 (오디오 업로드 대비)
    client_max_body_size 50M;

    # ── React 프론트엔드 (SPA) ─────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # React Router 사용 → 존재하지 않는 경로는 index.html로 폴백
        try_files $uri $uri/ /index.html;
    }

    # ── API 리버스 프록시 ──────────────────────────────────
    location /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 타임아웃 설정 (Suno AI 생성은 최대 30초 소요)
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── 헬스체크 엔드포인트 ────────────────────────────────
    location /health {
        proxy_pass http://backend:3000/health;
    }

    # ── 정적 파일 캐싱 최적화 ─────────────────────────────
    location ~* \.(js|css|png|svg|ico|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── 보안 헤더 ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
