# =========================================================
# AIVA FACTORY · Nginx 설정
# aiva-factory.p-e.kr      → React 프론트엔드 (정적 파일)
# api.aiva-factory.p-e.kr  → Express 백엔드 (리버스 프록시)
# =========================================================

# ── 프론트엔드: aiva-factory.p-e.kr ──────────────────────────
server {
    listen 80;
    server_name aiva-factory.p-e.kr www.aiva-factory.p-e.kr;

    client_max_body_size 50M;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA: 존재하지 않는 경로 → index.html 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 파일 장기 캐싱
    location ~* \.(js|css|png|svg|ico|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}

# ── API 서버: api.aiva-factory.p-e.kr ────────────────────────
server {
    listen 80;
    server_name api.aiva-factory.p-e.kr;

    client_max_body_size 50M;

    # 모든 요청을 백엔드 컨테이너로 프록시
    location / {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Suno AI 생성 최대 60초 대기
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Swagger UI 특별 처리: Content-Security-Policy 완화
    location /api-docs {
        proxy_pass http://backend:3000/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Swagger UI 인라인 스크립트 허용
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;";
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
