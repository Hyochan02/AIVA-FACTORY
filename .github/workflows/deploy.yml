# =========================================================
# AIVA FACTORY · GitHub Actions CI/CD
# main 브랜치 push 시 자동 배포:
#   1. 백엔드 Docker 이미지 빌드 → GHCR push
#   2. 프론트엔드 빌드
#   3. 프론트엔드 빌드 결과물 → EC2 nginx/html 복사
#   4. EC2에 SSH 접속 → 이미지 pull + backend 재시작
# =========================================================

name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. 코드 체크아웃 ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Docker Buildx 설정 ─────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. GHCR 로그인 ───────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. 이미지 이름 소문자 변환 ────────────────────────
      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/backend:latest" >> $GITHUB_ENV

      # ── 5. 백엔드 Docker 이미지 빌드 & GHCR push ──────────
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./aiva-backend
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Node.js 설정 ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: aiva-frontend/package-lock.json

      # ── 7. 프론트엔드 빌드 ────────────────────────────────
      - name: Build frontend
        working-directory: aiva-frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: https://api.aiva-factory.p-e.kr

      # ── 8. EC2에 프론트엔드 파일 복사 ─────────────────────
      - name: Copy frontend dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "aiva-frontend/dist/"
          target: "/home/ubuntu/aiva-factory/nginx/html/"
          strip_components: 2

      # ── 8-1. nginx.conf EC2에 복사 ────────────────────────
      - name: Copy nginx config to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "aiva-backend/nginx/nginx.conf"
          target: "/home/ubuntu/aiva-factory/nginx/nginx.conf"
          strip_components: 3

      # ── 9. EC2 SSH 접속 → Docker 재시작 ───────────────────
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/aiva-factory

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.prod.yml pull backend

            docker compose -f docker-compose.prod.yml up -d --no-deps backend

            docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload

            docker image prune -f

            echo "✅ 배포 완료: $(date)"
